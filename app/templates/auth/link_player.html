{% extends "base.html" %}
{% block content %}

<div class="container py-4">

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Link to Player</h5>
        </div>

        <div class="card-body">
            {% if players %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-4">
                    <label class="form-label">Select Player</label>
                    <select name="player_id" class="form-select select2">
                        <option value="">Choose player...</option>
                        {% for player in players %}
                        <option value="{{ player.id }}"
                            {% if current_user.player and current_user.player.id == player.id %}selected{% endif %}>
                            {{ player.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <button class="btn btn-primary">Link Player</button>
            </form>
            {% else %}
                <div class="alert alert-info">
                    All players are already linked.
                </div>
            {% endif %}
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
    $('.select2').select2();
});
</script>
{% endblock %}

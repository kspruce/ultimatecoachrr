<!-- app/templates/ml/player_prediction.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Player Performance Prediction</h1>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>Select Player and Game</h5>
                </div>
                <div class="card-body">
                    <form id="predictionForm">
                        <div class="form-group mb-3">
                            <label for="playerSelect">Player</label>
                            <select class="form-control" id="playerSelect" required>
                                <option value="">Select a player</option>
                                {% for player in players %}
                                <option value="{{ player.id }}">{{ player.first_name }} {{ player.last_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="gameSelect">Upcoming Game (Optional)</label>
                            <select class="form-control" id="gameSelect">
                                <option value="">Select a game</option>
                                {% for game in upcoming_games %}
                                <option value="{{ game.id }}">{{ game.date.strftime('%Y-%m-%d') }} vs {{ game.opponent }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Predict Performance</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card" id="predictionResults" style="display: none;">
                <div class="card-header">
                    <h5>Predicted Performance</h5>
                </div>
                <div class="card-body">
                    <h6 id="playerName"></h6>
                    <p id="gameDetails" class="text-muted"></p>
                    
                    <div class="mt-3">
                        <h6>Predictions</h6>
                        <table class="table table-sm">
                            <tbody>
                                <tr>
                                    <th>Goals</th>
                                    <td id="predGoals"></td>
                                </tr>
                                <tr>
                                    <th>Assists</th>
                                    <td id="predAssists"></td>
                                </tr>
                                <tr>
                                    <th>Blocks</th>
                                    <td id="predBlocks"></td>
                                </tr>
                                <tr>
                                    <th>Points Per Game</th>
                                    <td id="predPointsPerGame"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="alert alert-info mt-3">
                        <small>Predictions are based on historical performance data and may vary.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('predictionForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const playerId = document.getElementById('playerSelect').value;
    const gameId = document.getElementById('gameSelect').value;
    
    if (!playerId) {
        alert('Please select a player');
        return;
    }
    
    // Build URL
    let url = `/ml/player-prediction/${playerId}`;
    if (gameId) {
        url += `?game_id=${gameId}`;
    }
    
    // Show loading
    document.getElementById('predictionResults').style.display = 'none';
    
    // Fetch predictions
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            
            // Display results
            document.getElementById('playerName').textContent = data.player.name;
            
            if (data.game) {
                document.getElementById('gameDetails').textContent = 
                    `Game: ${data.game.date} vs ${data.game.opponent}`;
            } else {
                document.getElementById('gameDetails').textContent = 
                    'Based on recent performance (no specific game selected)';
            }
            
            document.getElementById('predGoals').textContent = data.predictions.goals;
            document.getElementById('predAssists').textContent = data.predictions.assists;
            document.getElementById('predBlocks').textContent = data.predictions.blocks;
            document.getElementById('predPointsPerGame').textContent = data.predictions.points_per_game;
            
            // Show results
            document.getElementById('predictionResults').style.display = 'block';
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred while fetching predictions');
        });
});
</script>
{% endblock %}

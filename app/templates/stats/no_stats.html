{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="uc-empty">
                    <div class="uc-empty-icon"><i class="bi bi-bar-chart"></i></div>
                    <h5>No Statistics Yet</h5>
                    <p>{{ player.name }} hasn't played in any recorded games yet. Once they participate and events are logged, their statistics will appear here.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{{ url_for('stats_dashboard.index') }}" class="btn btn-primary">
                            <i class="bi bi-arrow-left me-1"></i>Stats Dashboard
                        </a>
                        <a href="{{ url_for('team.player_detail', player_id=player.id) }}" class="btn btn-outline-secondary">View Player Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

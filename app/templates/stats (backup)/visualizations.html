{% extends "base.html" %}

{% block styles %}
<style>
    #field-heatmap {
        width: 100%;
        height: 400px;
        position: relative;
        background-color: #4CAF50;
        border: 2px solid #333;
        margin-bottom: 20px;
    }
    
    .endzone {
        position: absolute;
        height: 100%;
        width: 18%;
        background-color: #388E3C;
    }
    
    .endzone-left {
        left: 0;
    }
    
    .endzone-right {
        right: 0;
    }
    
    .field-line {
        position: absolute;
        background-color: white;
    }
    
    .center-line {
        left: 50%;
        height: 100%;
        width: 2px;
    }
    
    #player-connections {
        width: 100%;
        height: 500px;
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1>Statistical Visualizations</h1>
        </div>
        <div class="col-md-4 text-end">
            <a href="{{ url_for('stats_dashboard.index') }}" class="btn btn-secondary">Back to Stats</a>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5>Filter Visualizations</h5>
                </div>
                <div class="card-body">
                    <form method="get" action="{{ url_for('stats_dashboard.visualizations') }}">
                        <div class="row">
                            <div class="col-md-4">
                                <label for="game_id" class="form-label">Game</label>
                                <select name="game_id" id="game_id" class="form-select">
                                    <option value="">All Games</option>
                                    {% for game in games %}
                                    <option value="{{ game.id }}" {% if selected_game == game.id %}selected{% endif %}>
                                        vs {{ game.opponent }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="tournament_id" class="form-label">Tournament</label>
                                <select name="tournament_id" id="tournament_id" class="form-select">
                                    <option value="">All Tournaments</option>
                                    {% for tournament in tournaments %}
                                    <option value="{{ tournament.id }}" {% if selected_tournament == tournament.id %}selected{% endif %}>
                                        {{ tournament.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="player_id" class="form-label">Player</label>
                                <select name="player_id" id="player_id" class="form-select">
                                    <option value="">All Players</option>
                                    {% for player in players %}
                                    <option value="{{ player.id }}" {% if selected_player == player.id %}selected{% endif %}>
                                        {{ player.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-12 text-center">
                                <button type="submit" class="btn btn-primary">Update Visualizations</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5>Field Heatmap</h5>
                </div>
                <div class="card-body">
                    <div id="field-heatmap">
                        <div class="endzone endzone-left"></div>
                        <div class="endzone endzone-right"></div>
                        <div class="field-line center-line"></div>
                        <canvas id="heatmap-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
                    </div>
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input heatmap-filter" type="radio" name="heatmap-type" id="heatmap-all" value="all" checked>
                                <label class="form-check-label" for="heatmap-all">
                                    All Events
                                </label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input heatmap-filter" type="radio" name="heatmap-type" id="heatmap-throws" value="throws">
                                <label class="form-check-label" for="heatmap-throws">
                                    Throws Only
                                </label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input heatmap-filter" type="radio" name="heatmap-type" id="heatmap-catches" value="catches">
                                <label class="form-check-label" for="heatmap-catches">
                                    Catches Only
                                </label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input class="form-check-input heatmap-filter" type="radio" name="heatmap-type" id="heatmap-throwaways" value="throwaways">
                                <label class="form-check-label" for="heatmap-throwaways">
                                    Throwaways Only
                                </label>
                            </div>
                        </div>
                    </div>
    
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5>Player Connections</h5>
                </div>
                <div class="card-body">
                    <div id="player-connections"></div>
                    <div class="row mt-3">
                        <div class="col-md-12 text-center">
                            <div class="btn-group" role="group">
                                <button type="button" class="btn btn-outline-primary" id="connection-all">All Connections</button>
                                <button type="button" class="btn btn-outline-primary" id="connection-strong">Strong Connections</button>
                                <button type="button" class="btn btn-outline-primary" id="connection-weak">Weak Connections</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/heatmap.js@2.0.5/build/heatmap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.4.4/dist/d3.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Field heatmap
        const heatmapContainer = document.getElementById('field-heatmap');
        const heatmapInstance = h337.create({
            container: heatmapContainer,
            radius: 20,
            maxOpacity: 0.8,
            minOpacity: 0.1,
            blur: 0.75
        });
        
        // Parse all heatmap data
        const allHeatmapData = {{ heatmap_data|safe }};
        
        // Separate data by event type
        const throwsData = allHeatmapData.filter(point => point.event_type === 'throw' || point.event_type === 'assist');
        const catchesData = allHeatmapData.filter(point => point.event_type === 'catch' || point.event_type === 'goal');
        const throwawaysData = allHeatmapData.filter(point => point.event_type === 'throwaway');
        
        // Convert field coordinates to pixel coordinates
        const fieldWidth = heatmapContainer.offsetWidth;
        const fieldHeight = heatmapContainer.offsetHeight;
        const fieldLengthMeters = 100;  // Length in meters
        const fieldWidthMeters = 37;    // Width in meters
        
        function convertToPixelData(data) {
            return {
                max: 10,
                min: 0,
                data: data.map(point => ({
                    x: (point.x / fieldLengthMeters) * fieldWidth,
                    y: (point.y / fieldWidthMeters) * fieldHeight,
                    value: point.value
                }))
            };
        }
        
        // Set initial heatmap data (all events)
        heatmapInstance.setData(convertToPixelData(allHeatmapData));
        
        // Handle heatmap filter changes
        document.querySelectorAll('.heatmap-filter').forEach(radio => {
            radio.addEventListener('change', function() {
                let filteredData;
                
                switch(this.value) {
                    case 'throws':
                        filteredData = throwsData;
                        break;
                    case 'catches':
                        filteredData = catchesData;
                        break;
                    case 'throwaways':
                        filteredData = throwawaysData;
                        break;
                    default:
                        filteredData = allHeatmapData;
                }
                
                heatmapInstance.setData(convertToPixelData(filteredData));
            });
        });
        
        // Player connections network
        const connections = {{ connections|safe }};
        
        if (connections.nodes.length > 0) {
            const width = document.getElementById('player-connections').offsetWidth;
            const height = 500;
            
            const svg = d3.select('#player-connections')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // Create force simulation
            const simulation = d3.forceSimulation(connections.nodes)
                .force('link', d3.forceLink(connections.links).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2));
            
            // Create links
            const link = svg.append('g')
                .selectAll('line')
                .data(connections.links)
                .enter().append('line')
                .attr('stroke-width', d => Math.sqrt(d.value))
                .attr('stroke', '#999')
                .attr('stroke-opacity', 0.6)
                .attr('data-value', d => d.value);
            
            // Create nodes
            const node = svg.append('g')
                .selectAll('circle')
                .data(connections.nodes)
                .enter().append('circle')
                .attr('r', 15)
                .attr('fill', d => d.position === 'handler' ? '#ff7f0e' : (d.position === 'cutter' ? '#1f77b4' : '#2ca02c'))
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            // Add jersey numbers
            const label = svg.append('g')
                .selectAll('text')
                .data(connections.nodes)
                .enter().append('text')
                .text(d => d.jersey_number)
                .attr('font-size', 10)
                .attr('dx', -4)
                .attr('dy', 4)
                .attr('fill', 'white')
                .attr('text-anchor', 'middle');
            
            // Add player names
            const nameLabel = svg.append('g')
                .selectAll('text')
                .data(connections.nodes)
                .enter().append('text')
                .text(d => d.name)
                .attr('font-size', 10)
                .attr('dy', 25)
                .attr('text-anchor', 'middle');
            
            // Update positions on tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node
                    .attr('cx', d => d.x)
                    .attr('cy', d => d.y);
                
                label
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
                
                nameLabel
                    .attr('x', d => d.x)
                    .attr('y', d => d.y);
            });
            
            // Drag functions
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
            
            // Connection filter buttons
            document.getElementById('connection-all').addEventListener('click', function() {
                link.style('display', 'block');
            });
            
            document.getElementById('connection-strong').addEventListener('click', function() {
                link.style('display', d => d.value >= 3 ? 'block' : 'none');
            });
            
            document.getElementById('connection-weak').addEventListener('click', function() {
                link.style('display', d => d.value < 3 ? 'block' : 'none');
            });
        } else {
            document.getElementById('player-connections').innerHTML = '<p class="text-center mt-5">Not enough data to generate player connections.</p>';
        }
    });
</script>

{% endblock %}

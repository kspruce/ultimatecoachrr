{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Team Management</h1>
    
    <div class="mb-3">
        <a href="{{ url_for('team_organization.add') }}" class="btn btn-primary">Add New Team</a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Slug</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for team in teams %}
                    <tr>
                        <td>{{ team.name }}</td>
                        <td>{{ team.slug }}</td>
                        <td>
                            <a href="{{ url_for('team_organization.switch', team_id=team.id) }}" class="btn btn-sm btn-info">Switch to Team</a>
                            <a href="{{ url_for('team_organization.edit', team_id=team.id) }}" class="btn btn-sm btn-primary">Edit</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

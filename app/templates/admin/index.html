{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Admin Dashboard</h1>
    <p class="lead">Welcome to the admin dashboard.</p>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Statistics Management</h5>
                </div>
                <div class="card-body">
                    <p>Calculate and manage statistics for players and teams.</p>
                    <a href="{{ url_for('admin_stats.calculator') }}" class="btn btn-primary">
                        <i class="fas fa-calculator"></i> Stats Calculator
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Ultimate Coach</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 2rem;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
    }
    p {
      color: #666;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #0d6efd;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Some features of Ultimate Coach may not work properly until you're back online.</p>
  <p>Any data you've entered will be saved locally and synchronized when you reconnect.</p>
  <a href="/" class="btn">Try Again</a>
</body>
</html>

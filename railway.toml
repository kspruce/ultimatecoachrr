[build]
builder = "NIXPACKS"
# Install headless Chromium (+ system deps) for playbook PDF export
buildCommand = "playwright install --with-deps chromium"

[deploy]
startCommand = "python add_play_image_url.py && gunicorn run:application --timeout 300"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
